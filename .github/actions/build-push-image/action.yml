name: "Build and publish to ECR"
description: "Build Spring Boot app and push an image to Amazon ECR with OIDC"
inputs:
  image: { required: true, description: "Image name to publish (e.g. hostname/namespace/repository)" }
  itag:  { required: true, description: "Immutable registry tag (e.g. v1.2.3 or pr-123-d2a094ef)" }
  mtag:  { required: false, description: "Optional mutable registry tag to publish (e.g. pr-123)", default: "" }
  module_dir: { required: false, description: "Gradle submodule directory to build", default: "provider-data-service" }
runs:
  using: composite
  steps:
    - name: "Build OCI image with Gradle and push immutable registry tag to ECR"
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        ITAG:  ${{ inputs.itag }}
        MODULE_DIR: ${{ inputs.module_dir }}
      run: |
        set -eu
        # Run bootBuildImage for the selected subproject
        ./gradlew ":${MODULE_DIR}:bootBuildImage" --imageName="${IMAGE}:pdp-${ITAG}"
        docker push "${IMAGE}:pdp-${ITAG}"

    - name: "Add mutable registry tag as alias and push"
      if:   inputs.mtag != ''
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        ITAG:  ${{ inputs.itag }}
        MTAG:  ${{ inputs.mtag }}
      run: |
        set -eu
        docker tag "${IMAGE}:pdp-${ITAG}" "${IMAGE}:pdp-${MTAG}"
        docker push "${IMAGE}:pdp-${MTAG}"

    - name: "Scan OCI image with Snyk"
      id:   snyk_scan
      continue-on-error: true
      uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
      env:
        SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
      with:
        image: ${{ inputs.image }}:pdp-${{ inputs.itag }}
        sarif: true
        args: --json-file-output=snyk.json --policy-path=.snyk --sarif-file-output=snyk.sarif

    - name: "Check for Snyk output files"
      id:   snyk_outputs
      if:   always()
      shell: bash
      run: |
        if [ -f snyk.json ]; then
          echo "json_exists=true" >> "$GITHUB_OUTPUT"
          echo "Snyk JSON output: present"
        else
          echo "json_exists=false" >> "$GITHUB_OUTPUT"
          echo "Snyk JSON output: missing"
        fi
        if [ -f snyk.sarif ]; then
          echo "sarif_exists=true" >> "$GITHUB_OUTPUT"
          echo "Snyk SARIF output: present"
        else
          echo "sarif_exists=false" >> "$GITHUB_OUTPUT"
          echo "Snyk SARIF output: missing"
        fi

    - name: "Print Snyk JSON findings"
      if:   always() && steps.snyk_outputs.outputs.json_exists == 'true'
      shell: bash
      run: |
        cat snyk.json

    - name: "Sanitise Snyk SARIF (replace null security-severity values)"
      if:   always() && steps.snyk_outputs.outputs.sarif_exists == 'true'
      shell: bash
      run: |
        # Snyk occasionally omits or nulls security-severity; GitHub Code Scanning rejects that.
        # Replace explicit nulls, then add a default wherever the field is still absent.
        echo "=== security-severity values before patch ==="
        jq '[.. | objects | select(has("security-severity")) | .["security-severity"]] | unique' snyk.sarif

        jq 'walk(if type == "object" and has("security-severity") and .["security-severity"] == null
                 then .["security-severity"] = "0.0" else . end)' snyk.sarif \
          | jq '(.runs[].tool | .driver, .extensions[]?).rules[].properties["security-severity"] //= "0.0"' \
          > snyk-fixed.sarif && mv snyk-fixed.sarif snyk.sarif

        echo "=== security-severity values after patch ==="
        jq '[.. | objects | select(has("security-severity")) | .["security-severity"]] | unique' snyk.sarif

    - name: "Upload Snyk SARIF results"
      if:   always() && steps.snyk_outputs.outputs.sarif_exists == 'true'
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      with:
        sarif_file: snyk.sarif
        category: snyk-docker
