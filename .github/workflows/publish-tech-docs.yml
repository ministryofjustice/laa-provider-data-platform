name: "Publish tech-docs"

on:
  push:
    branches: [ main ]
    paths: [ "tech-docs/**", ".github/workflows/publish-tech-docs.yml", "provider-data-api/laa-data-pda.yml" ]
  workflow_dispatch:

# GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  prepare-api-spec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            provider-data-api/laa-data-pda.yml
            tech-docs/scripts/prepare-api-spec.sh
          sparse-checkout-cone-mode: false

      - name: "Generate API spec pages"
        run: |
          mkdir -p tech-docs/source/pdp-docs
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            node:lts-slim \
            sh tech-docs/scripts/prepare-api-spec.sh

      - name: "Upload generated API spec pages"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: generated-api-spec
          path: |
            tech-docs/source/pdp-docs/laa-data-pda.yml
            tech-docs/source/pdp-docs/api-spec-widdershins.html.md
          retention-days: 1

  build:
    needs: prepare-api-spec
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ministryofjustice/tech-docs-github-pages-publisher:v6.0.1
    permissions:
      contents: read
    steps:
      # We only check out the tech-docs directory, which allows us to keep all
      # necessary files for generating the tech-docs separate from the app.
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            tech-docs
          sparse-checkout-cone-mode: false

      - name: "Download generated API spec pages"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: generated-api-spec
          path: tech-docs/source/pdp-docs/

      - name: "Compile Markdown to HTML and create artifact"
        # Script to deploy is not in the repo, but in this image:
        # `ministryofjustice/tech-docs-github-pages-publisher:v6.0.1`
        run: |
          cd tech-docs && /usr/local/bin/package

      - name: "Upload artifact to be published"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: github-pages
          path: tech-docs/artifact.tar
          retention-days: 1
          overwrite: true

  deploy:
    needs: build
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: "Setup Pages"
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  url-check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: "Download a Build Artifact from build"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages
          path: github-pages

      - name: "Unpack files and check URL links"
        run: |
          cd github-pages
          tar -xf artifact.tar
          npm install linkinator
          npx linkinator . --recurse --markdown \
            --skip https://ministryofjustice.github.io/laa-provider-data-platform/images/ \
            --skip javascripts/govuk_frontend.js \
            --skip 'http://localhost:.*' \
            --skip 'https://github.com/ministryofjustice/laa-provider-data-platform/blob/main/tech-docs/source/.*\.md\.erb'
