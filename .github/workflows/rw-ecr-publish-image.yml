name: "Reusable workflow: ECR publish image"

on:
  workflow_call:
    inputs:
      itag: { type: string, required: true }
      mtag: { type: string, required: false }
  workflow_dispatch:
    inputs:
      itag: { type: string, required: true, description: "Immutable registry tag (e.g. 'v1.4.2', 'pr-925-0af')" }
      mtag: { type: string, required: false, description: "Optional mutable registry tag (e.g. 'pr-925')" }

jobs:
  ecr-publish-image:
    name: "ECR publish image"
    permissions: { actions: read, contents: read, id-token: write, packages: read, security-events: write }
    runs-on: ubuntu-latest
    steps:
      - name: "Validate registry tag names"
        shell: bash
        run: |
          set -eu
          check_rtag() {
            # `vM.N.P[-suffix]` or `pr-N[-suffix]`
            printf '%s\n' "$2" | grep -Eq '^(v[0-9]+\.[0-9]+\.[0-9]+|pr-[0-9]+)(-[0-9A-Za-z_-]+)?$' || {
              printf 'Error: disallowed characters in %s: [%s]\n' "$1" "$2" >&2
              return 1
            }
          }
          check_rtag itag "${{ inputs.itag }}"
          check_rtag mtag "${{ inputs.mtag || 'pr-1' }}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Set up Java 25 (Temurin distro)"
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: "temurin"
          java-version: "25"

      - name: "Set up Gradle"
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: "ECR credentials guard"
        id:   ecr_guard
        shell: bash
        env:
          ECR_REGION:         ${{ vars.DPD_ECR_REGION }}
          ECR_ROLE_TO_ASSUME: ${{ secrets.DPD_ECR_ROLE_TO_ASSUME }}
        run: |
          if [ -n "$ECR_REGION" ] && [ -n "$ECR_ROLE_TO_ASSUME" ]; then
            echo "ecr_auth_attempted=true" >> "$GITHUB_OUTPUT"
          else
            echo "Did not authenticate to ECR as AWS details were missing" >&2
          fi

      - name: "Configure AWS credentials"
        if:   steps.ecr_guard.outputs.ecr_auth_attempted == 'true'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region:     ${{ vars.DPD_ECR_REGION }}
          role-to-assume: ${{ secrets.DPD_ECR_ROLE_TO_ASSUME }}

      - name: "Log in to Amazon ECR"
        if:   steps.ecr_guard.outputs.ecr_auth_attempted == 'true'
        id:   ecr_login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: "Build OCI image with Gradle and push immutable registry tag to ECR"
        if:   steps.ecr_guard.outputs.ecr_auth_attempted == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          IMAGE:        ${{ steps.ecr_login.outputs.registry }}/${{ vars.DPD_ECR_REPOSITORY }}
          ITAG:         ${{ inputs.itag }}
          MODULE_DIR:   provider-data-service
        run: |
          set -eu
          sed -E -i.bak -e "s|^(version[[:space:]]*=[[:space:]]*).*|\1${ITAG#v}|" gradle.properties \
              && rm -f gradle.properties.bak
          ./gradlew ":${MODULE_DIR}:bootBuildImage" --imageName="${IMAGE}:pdp-${ITAG}"
          docker push "${IMAGE}:pdp-${ITAG}"

      - name: "Add mutable registry tag as alias and push"
        if:   steps.ecr_guard.outputs.ecr_auth_attempted == 'true' && inputs.mtag != ''
        shell: bash
        env:
          IMAGE: ${{ steps.ecr_login.outputs.registry }}/${{ vars.DPD_ECR_REPOSITORY }}
          ITAG:  ${{ inputs.itag }}
          MTAG:  ${{ inputs.mtag }}
        run: |
          set -eu
          docker tag "${IMAGE}:pdp-${ITAG}" "${IMAGE}:pdp-${MTAG}"
          docker push "${IMAGE}:pdp-${MTAG}"

      - name: "Scan OCI image with Snyk"
        if:   steps.ecr_guard.outputs.ecr_auth_attempted == 'true'
        id:   snyk_scan
        continue-on-error: true
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ steps.ecr_login.outputs.registry }}/${{ vars.DPD_ECR_REPOSITORY }}:pdp-${{ inputs.itag }}
          sarif: true
          args: --json-file-output=snyk.json --policy-path=.snyk --sarif-file-output=snyk.sarif

      - name: "Check for Snyk output files"
        id:   snyk_outputs
        if:   always()
        shell: bash
        run: |
          if [ -f snyk.json ]; then
            echo "json_exists=true" >> "$GITHUB_OUTPUT"
            echo "Snyk JSON output: present"
          else
            echo "json_exists=false" >> "$GITHUB_OUTPUT"
            echo "Snyk JSON output: missing"
          fi
          if [ -f snyk.sarif ]; then
            echo "sarif_exists=true" >> "$GITHUB_OUTPUT"
            echo "Snyk SARIF output: present"
          else
            echo "sarif_exists=false" >> "$GITHUB_OUTPUT"
            echo "Snyk SARIF output: missing"
          fi

      - name: "Print Snyk JSON findings"
        if:   always() && steps.snyk_outputs.outputs.json_exists == 'true'
        shell: bash
        run: |
          cat snyk.json

      - name: "Sanitise Snyk SARIF (replace null security-severity values)"
        if:   always() && steps.snyk_outputs.outputs.sarif_exists == 'true'
        shell: bash
        run: |
          jq 'walk(if type == "object" and has("security-severity") and
                   (.["security-severity"] == null or .["security-severity"] == "null")
                   then .["security-severity"] = "0.0" else . end)' snyk.sarif > snyk-fixed.sarif
          mv snyk-fixed.sarif snyk.sarif

      - name: "Upload Snyk SARIF results"
        if:   always() && steps.snyk_outputs.outputs.sarif_exists == 'true'
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: snyk.sarif
          category:   snyk-docker

      - name: "Send failure Slack message"
        if:   failure()
        shell: bash
        env:
          RTAG: ${{ inputs.mtag || inputs.itag }}
        run: |
          set -eu
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          case "$RTAG" in
            pr-*) exit ;; # PR builds do NOT send alerts
            v*)   MESSAGE=" :github-failure:  Failed to build main @${RTAG}. View run log at ${RUN_URL}" ;;
            *)    MESSAGE=" :github-failure:  Failed to build tag [${RTAG}]. View run log at ${RUN_URL}" ;;
          esac
          curl -X POST -H "Content-Type: application/json" --data "{\"text\": \"${MESSAGE}\"}" \
              "${{ secrets.SLACK_WEBHOOK }}"
