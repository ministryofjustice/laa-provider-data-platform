name: "Reusable workflow: End-to-end test"

on:
  workflow_call:
    inputs:
      target:      { type: string, required: true }
      rel:         { type: string, required: false, default: "" }
      servicePort: { type: string, required: false, default: "8080" }
  workflow_dispatch:
    inputs:
      target:      { type: choice, required: true, options: [ "uat", "staging", "prod" ], default: "uat",
                     description: "Target environment" }
      rel:         { type: string, required: false, default: "",
                     description: "Optional release name (e.g. 'pr-913', defaults to stable release)" }
      servicePort: { type: number, required: false, default: 8080,
                     description: "Optional service port to forward (e.g. '8080', defaults to 8080)" }

jobs:
  e2etest:
    name: "E2E test in ${{ inputs.target }} of ${{ inputs.rel || 'stable' }}"
    permissions: { contents: read, packages: read }
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    concurrency: rw-pdp-e2e-${{ inputs.target }}-${{ inputs.rel || 'stable' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Determine variable values"
        id:   vars
        shell: bash
        env:
          TARGET: ${{ inputs.target }}
          REL:    ${{ inputs.rel || 'stable' }}
          SP:     ${{ inputs.servicePort }}
        run: |
          echo "Run e2e tests - target: [$TARGET], rel: [$REL], servicePort: [$SP]"
          # Map target to profile
          case "$TARGET" in
            dev)     PROFILE=dev ;;
            uat)     PROFILE=uat ;;
            staging) PROFILE=staging ;;
            prod)    PROFILE=prod ;;
            *)       exit 1 ;;
          esac
          # Determine service name
          SVC="pdp-${REL}-provider-data-platform"
          echo "Resolved profile name: [$PROFILE]"
          echo "Resolved service name: [$SVC]"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "svc=$SVC" >> "$GITHUB_OUTPUT"

      - name: "Set up Java 25 (Temurin distro)"
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"

      - name: "Set up Gradle (cache)"
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: "Authenticate with Kubernetes cluster"
        id:   kube_auth
        uses: ./.github/actions/cp-kube-auth
        with:
          kube_cert:      ${{ secrets.DPD_KUBE_CERT }}
          kube_cluster:   ${{ secrets.DPD_KUBE_CLUSTER }}
          kube_namespace: ${{ secrets.DPD_KUBE_NAMESPACE }}
          kube_token:     ${{ secrets.DPD_KUBE_TOKEN }}

      - name: "Display Kubernetes context (diagnostic-only)"
        if:   steps.kube_auth.outputs.kube_auth_attempted == 'true'
        run: |
          kubectl config current-context
          kubectl -n "${{ secrets.DPD_KUBE_NAMESPACE }}" get svc "${{ steps.vars.outputs.svc }}" -o wide || true

      - name: "Wait for rollout" # Because this tends to be run just after a deployment
        if:   steps.kube_auth.outputs.kube_auth_attempted == 'true'
        run: |
          kubectl -n "${{ secrets.DPD_KUBE_NAMESPACE }}" rollout status deploy/"${{ steps.vars.outputs.svc }}" --timeout=180s || true

      - name: "Port-forward service -> localhost:18080"
        if:   steps.kube_auth.outputs.kube_auth_attempted == 'true'
        env:
          NS:  ${{ secrets.DPD_KUBE_NAMESPACE }}
          SP:  ${{ inputs.servicePort }}
          SVC: ${{ steps.vars.outputs.svc }}
        run: |
          echo "Port-forwarding svc/${SVC} on ${SP} → localhost:18080 in namespace=${NS}"
          kubectl -n "${NS}" port-forward "svc/${SVC}" 18080:"${SP}" &
          echo $! > /tmp/pf.pid
          sleep 3

      - name: "Resolve database credentials from Kubernetes secret"
        if:   steps.kube_auth.outputs.kube_auth_attempted == 'true'
        id:   db_creds
        env:
          NS: ${{ secrets.DPD_KUBE_NAMESPACE }}
        run: |
          SECRET_NAME="rds-postgresql-instance-output"
          DB_HOST=$(kubectl -n "${NS}" get secret "${SECRET_NAME}" -o jsonpath='{.data.rds_instance_endpoint}' | base64 -d)
          DB_NAME=$(kubectl -n "${NS}" get secret "${SECRET_NAME}" -o jsonpath='{.data.database_name}' | base64 -d)
          DB_USER=$(kubectl -n "${NS}" get secret "${SECRET_NAME}" -o jsonpath='{.data.database_username}' | base64 -d)
          DB_PASS=$(kubectl -n "${NS}" get secret "${SECRET_NAME}" -o jsonpath='{.data.database_password}' | base64 -d)
          echo "::add-mask::${DB_PASS}"
          echo "db_host=${DB_HOST}" >> "$GITHUB_OUTPUT"
          echo "db_name=${DB_NAME}" >> "$GITHUB_OUTPUT"
          echo "db_user=${DB_USER}" >> "$GITHUB_OUTPUT"
          echo "db_pass=${DB_PASS}" >> "$GITHUB_OUTPUT"

      # TODO: The GitHub Actions runner may not have direct network access to the RDS
      # instance. If that is the case, set up a port-forward or proxy here. For example:
      #   kubectl -n "${NS}" run db-proxy --image=alpine/socat --restart=Never \
      #     -- TCP-LISTEN:5432,fork TCP:${DB_HOST}:5432
      #   kubectl -n "${NS}" port-forward pod/db-proxy 15432:5432 &
      # Then use jdbc:postgresql://127.0.0.1:15432/${DB_NAME} as E2E_DB_URL below.

      - name: "Run E2E tests"
        if:   steps.kube_auth.outputs.kube_auth_attempted == 'true'
        env:
          AUTH_TOKEN:       ""
          GITHUB_TOKEN:    ${{ github.token }}
          GITHUB_ACTOR:    ${{ github.actor }}
          PROFILE:         ${{ steps.vars.outputs.profile }}
          E2E_DB_URL:      jdbc:postgresql://${{ steps.db_creds.outputs.db_host }}/${{ steps.db_creds.outputs.db_name }}
          E2E_DB_USERNAME: ${{ steps.db_creds.outputs.db_user }}
          E2E_DB_PASSWORD: ${{ steps.db_creds.outputs.db_pass }}
        run: |
          ./gradlew :provider-data-e2e:e2eTest \
            -Pe2e.env="$PROFILE" \
            -De2e.baseUri="http://127.0.0.1:18080" \
            -De2e.authToken="${AUTH_TOKEN}" \
            --stacktrace

      - name: "Upload E2E reports"
        if:   always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-${{ inputs.target }}-${{ inputs.rel || 'stable' }}-reports
          path: |
            provider-data-e2e/build/reports/**
            provider-data-e2e/build/test-results/**
          if-no-files-found: ignore

      - name: "Cleanup port-forward"
        if:   always()
        run: |
          test -f /tmp/pf.pid && kill "$(cat /tmp/pf.pid)" 2>/dev/null || true
          echo "==== Port-forward processes ===="
          ps -ef | grep "[p]ort-forward" || true
