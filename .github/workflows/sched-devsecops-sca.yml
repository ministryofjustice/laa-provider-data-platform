name: "Scheduled: devsecops/sca analysis"

on:
  schedule:
    - cron: "13 4 * * *"
  workflow_dispatch:

jobs:
  devsecops-sca:
    name: "devsecops/sca analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: { actions: read, contents: write, issues: write, packages: read,
                   pull-requests: write, security-events: write }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Set up Java 25 (Temurin distro)"
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25

      - name: "Set up Gradle (cache)"
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: "Build classes without running tests"
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./gradlew clean assemble testClasses integrationTestClasses

      - name: "Software composition analysis"
        uses: ministryofjustice/devsecops-actions/sca@8c77d3a65a46d1d4b5416eafae5b84371ecd797d # v1.5.0
        env:
          JAVA_HOME: /opt/jdk
          JAVA_HOME_25_X64: ""
          GITHUB_TOKEN: ${{ github.token }}
        with:
          token: ${{ github.token }}
          codeql-upload-findings: "never"
