# Pre-commit hooks configuration
# See https://pre-commit.com for more information

# This configuration integrates:
# 1. devsecops-hooks: Secret scanning using GitLeaks
# 2. Spotless: Code formatting (Java)
# 3. Commit message validation: Ensures conventional commit format

repos:
  # Ministry of Justice DevSecOps hooks for secret detection
  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: 53d252e406bae2bbbd0c0f3205b72870a02c9b3f  # frozen: v2.0.2
    hooks:
      - id: baseline
        stages: [commit, push]
        # Exclude directories that are not part of the codebase
        exclude: |
          (?x)^(
            build/|
            .gradle/|
            .idea/|
            .git/|
            reports/|
            tech-docs/|
            gradle/
          )

  # Local hook for commit message validation
  - repo: local
    hooks:
      - id: commit-msg-validation
        name: Commit message validation
        entry: |
          bash -c '
          MSG=$(head -n 1 "$1")
          [[ "$MSG" =~ ^Merge\ branch ]] && exit 0
          [[ "$MSG" =~ ^Revert ]] && exit 0
          [[ "$MSG" =~ ^(feat|fix|chore|refactor|test|spike|docs|ci|infra)(\(|:|\s) ]] && exit 0
          echo "⛔ Invalid commit message. Must start with: feat|fix|chore|refactor|test|spike|docs|ci|infra"
          exit 1' --
        language: system
        stages: [commit-msg]
        always_run: true

      - id: branch-name-check
        name: Branch name convention
        entry: |
          bash -c '
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          MAX_LEN=50
          PATTERN="^(feature|chore|refactor|bugfix)/(([A-Z][A-Z0-9_]{0,9}-[0-9]{1,10})(-[a-z0-9]+([.-][a-z0-9]+)*)?|[a-z0-9]+([.-][a-z0-9]+)*)$"
          if (( ${#BRANCH} > MAX_LEN )) || [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "⛔ Invalid branch name: $BRANCH"
            echo "Expected: (feature|chore|refactor|bugfix)/[<JIRA-ISSUE>-]<description>"
            echo "<JIRA-ISSUE>: Jira ticket ID (for example PROJECT-1234)"
            echo "<description>: lower-case letters/numbers, with '-' or '.' separators"
            echo "Examples:"
            echo "  feature/PROJECT-1234-my-description1"
            echo "  feature/my-description2"
            echo "  feature/PROJECT-1234"
            echo "  feature/prepare-for-version-2.0"
            exit 1
          fi
          ' --
        language: system
        stages: [commit]
        always_run: true
        pass_filenames: false

      - id: commit-signing-config
        name: Commit signing configured
        entry: |
          bash -c '
          KEY="$(git config --get user.signingkey || true)"
          SIGN="$(git config --get commit.gpgsign || true)"
          FORMAT="$(git config --get gpg.format || echo openpgp)"
          [ -n "$KEY" ] && [ "$SIGN" = "true" ] && { [ "$FORMAT" = "openpgp" ] || [ "$FORMAT" = "ssh" ]; } && exit 0
          echo "⛔ Git commit signing is likely not configured correctly. Check user.signingkey, commit.gpgsign, and gpg.format"
          exit 1'
        language: system
        stages: [commit]
        always_run: true
        pass_filenames: false

      - id: spotless-format
        name: Spotless Java formatting
        entry: bash -c './gradlew spotlessApply'
        language: system
        stages: [commit]
        types: [java]
        pass_filenames: false

      - id: checkstyle-staged
        name: Checkstyle validation
        entry: bash -c 'IFS=,; ./gradlew checkstyleStaged "-PcheckstyleFiles=$*"' --
        language: system
        stages: [commit]
        types: [java]
        pass_filenames: true
