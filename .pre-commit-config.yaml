# Pre-commit hooks configuration
# Run via `prek` (a Rust drop-in replacement for the `pre-commit` framework — no Python required).
# See https://pre-commit.com and https://github.com/j178/prek for more information.

# This configuration integrates:
# 1. pre-commit-hooks: Generic file hygiene checks (whitespace, EOF, YAML/JSON, large files, etc.)
# 2. devsecops-hooks: Secret scanning using GitLeaks
# 3. Local hooks: Commit message/branch name checks, commit-signing reminder, and
#    Java formatting/style checks (Spotless, Checkstyle)

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Generic hygiene checks (whitespace, EOF newline, YAML/merge-conflict validation)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Spring profile config files (e.g. application.yml) use multiple `---`-separated
        # YAML documents; Helm templates contain Go templating syntax and are not valid
        # plain YAML until rendered.
        args: [--allow-multiple-documents]
        exclude: ^helm_deploy/provider-data-platform/templates/
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-json
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: detect-private-key

  # Ministry of Justice DevSecOps hooks for secret detection
  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: 53d252e406bae2bbbd0c0f3205b72870a02c9b3f  # frozen: v2.0.2
    hooks:
      - id: baseline
        stages: [commit, push]
        # Exclude directories that are not part of the codebase
        exclude: |
          (?x)^(
            .git/|
            .gradle/|
            .idea/|
            bin/|
            build/|
            gradle/|
            reports/|
            tech-docs/
          )

  # Local hooks for commit/branch conventions and Java formatting
  - repo: local
    hooks:
      - id: commit-msg-check
        name: Commit message format (must mirror the GitHub ruleset regex)
        entry: |
          bash -c '
          MSG=$(head -n 1 "$1")
          [[ "$MSG" =~ ^Merge\ branch ]] && exit 0
          [[ "$MSG" =~ ^Revert ]] && exit 0
          [[ "$MSG" =~ ^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([[:alnum:]_.-]+\))?(!)?:\ .+$ ]] && exit 0
          echo "⛔ Invalid commit message. Must start with: build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test"
          exit 1' --
        language: system
        stages: [commit-msg]
        always_run: true

      - id: branch-name-check
        name: Branch name convention
        entry: |
          bash -c '
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          MAX_LEN=50
          PATTERN="^(bugfix|chore|feat|feature|fix|hotfix|release)\/(([A-Z][A-Z0-9_]{0,9}-[0-9]{1,10})(-[a-z0-9]+([.-][a-z0-9]+)*)?|[a-z0-9]+([.-][a-z0-9]+)*)$"
          if (( ${#BRANCH} > MAX_LEN )) || [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "⛔ Invalid branch name: $BRANCH"
            echo "Expected: (bugfix|chore|feat|feature|fix|hotfix|release)/[<JIRA-ISSUE>-]<description>"
            echo "<JIRA-ISSUE>: Jira ticket ID (for example PROJECT-1234)"
            echo "<description>: lower-case letters/numbers, with '-' or '.' separators"
            echo "Examples:"
            echo "  feature/PROJECT-1234-my-description1"
            echo "  feature/my-description2"
            echo "  feature/PROJECT-1234"
            echo "  feature/prepare-for-version-2.0"
            echo "Rename current branch: git branch -m <new-name>"
            echo "Rename another branch: git branch -m <old-name> <new-name>"
            exit 1
          fi
          ' --
        language: system
        stages: [commit]
        always_run: true
        pass_filenames: false

      - id: commit-signing-reminder
        name: Commit signing configuration reminder (not enforced here — see GitHub's required-signed-commits setting)
        entry: |
          bash -c '
          KEY="$(git config --get user.signingkey || true)"
          SIGN="$(git config --get commit.gpgsign || true)"
          FORMAT="$(git config --get gpg.format || echo openpgp)"
          [ -n "$KEY" ] && [ "$SIGN" = "true" ] && { [ "$FORMAT" = "openpgp" ] || [ "$FORMAT" = "ssh" ]; } && exit 0
          echo "⛔ Git commit signing is likely not configured correctly. Check user.signingkey, commit.gpgsign, and gpg.format"
          exit 1'
        language: system
        stages: [commit]
        always_run: true
        pass_filenames: false

      - id: spotless-format
        name: Spotless Java auto-format
        entry: bash -c './gradlew spotlessApply'
        language: system
        stages: [commit]
        types: [java]
        pass_filenames: false

      - id: checkstyle-check
        name: Checkstyle validation (staged files)
        entry: bash -c 'IFS=,; ./gradlew checkstyleStaged "-PcheckstyleFiles=$*"' --
        language: system
        stages: [commit]
        types: [java]
        pass_filenames: true
