services:
  db:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost, so only accessible via loopback
    environment:
      POSTGRES_DB: provider_data
      POSTGRES_USER: provider
      POSTGRES_PASSWORD: localdev
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Local developer Zipkin. A deployed environment would normally use an externally managed Zipkin
  # service, configured with `management.tracing.export.zipkin.endpoint`.
  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "127.0.0.1:9411:9411"  # Bind to localhost so the Zipkin UI is local-only

volumes:
  postgres-data:
