{{/*
deployment.yaml
Defines the Kubernetes Deployment for the application.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "provider-data-platform.fullname" . }}
  labels:
    {{- include "provider-data-platform.labels" . | nindent 4 }}
spec:
  {{- if not (.Values.autoscaling).enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "provider-data-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "provider-data-platform.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "provider-data-platform.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- if .Values.postgresContainer.enabled }}
            # Sidecar PostgreSQL connection (PR preview environments).
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://localhost:{{ .Values.postgresContainer.port }}/{{ .Values.postgresContainer.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.postgresContainer.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.postgresContainer.password | quote }}
            # Allow Flyway to retry until the postgres sidecar is ready.
            - name: SPRING_FLYWAY_CONNECT_RETRIES
              value: "30"
            # Do not fail on pool initialisation — postgres may not be ready yet.
            - name: SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT
              value: "-1"
            {{- else }}
            # RDS PostgreSQL connection (shared/release environments).
            - name: DB_HOST # Intermediate var for building the JDBC URL
              valueFrom:
                secretKeyRef:
                  name: {{ (.Values.secretNames).rdspgConnection }}
                  key: rds_instance_endpoint
            - name: DB_NAME # Intermediate var for building the JDBC URL
              valueFrom:
                secretKeyRef:
                  name: {{ (.Values.secretNames).rdspgConnection }}
                  key: database_name
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ (.Values.secretNames).rdspgConnection }}
                  key: database_username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ (.Values.secretNames).rdspgConnection }}
                  key: database_password
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(DB_HOST)/$(DB_NAME)" # "?sslmode=require"
            {{- end }}
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: "org.postgresql.Driver"

            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.javaToolOptions | quote }}
            # https://user-guide.cloud-platform.service.justice.gov.uk/documentation/deploying-an-app/container-repositories/requirements.html#setting-utc-timezone-inside-your-container
            - name: TZ
              value: UTC
            - name: SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: {{ (.Values.secretNames).envConfig }}
                  key: SLACK_WEBHOOK
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ (.Values.secretNames).envConfig }}
                  key: SENTRY_DSN
                  optional: true
            - name: AUTHORIZED_CLIENTS
              valueFrom:
                secretKeyRef:
                  name: {{ (.Values.secretNames).envConfig }}
                  key: AUTHORIZED_CLIENTS
            - name: AUTHORIZED_ROLES
              valueFrom:
                secretKeyRef:
                  name: {{ (.Values.secretNames).envConfig }}
                  key: AUTHORIZED_ROLES
            - name: UNPROTECTED_URIS
              valueFrom:
                secretKeyRef:
                  name: {{ (.Values.secretNames).envConfig }}
                  key: UNPROTECTED_URIS
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- if (.Values.target).environment }}
            - name: TARGET_ENVIRONMENT
              value: "{{ (.Values.target).environment }}"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.postgresContainer.enabled }}
        - name: postgres
          image: {{ .Values.postgresContainer.image | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001  # bitnami/postgresql runs as UID 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          ports:
            - name: postgres
              containerPort: {{ .Values.postgresContainer.port }}
          env:
            - name: POSTGRESQL_DATABASE
              value: {{ .Values.postgresContainer.database | quote }}
            - name: POSTGRESQL_USERNAME
              value: {{ .Values.postgresContainer.username | quote }}
            - name: POSTGRESQL_PASSWORD
              value: {{ .Values.postgresContainer.password | quote }}
          startupProbe:
            exec:
              # pg_isready passes too early — bitnami/postgresql starts postgres in init mode,
              # creates the database, then internally restarts. Use psql to run an actual query,
              # which only succeeds after the internal restart completes.
              command: [psql, -U, {{ .Values.postgresContainer.username }}, -d, {{ .Values.postgresContainer.database }}, -c, "SELECT 1"]
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            exec:
              command: [pg_isready, -U, {{ .Values.postgresContainer.username }}, -d, {{ .Values.postgresContainer.database }}]
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.postgresContainer.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: /bitnami/postgresql
        {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
