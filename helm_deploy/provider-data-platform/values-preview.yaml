# values-preview.yaml
# Preview (PR) environment override values for the chart.
# These environments use an ephemeral PostgreSQL sidecar instead of RDS.
# Per-PR values (ingress host, image tag, postgres password) are set by the deploy workflow.

target:
  environment: preview

# The app container's default 512Mi heap (see values.yaml javaToolOptions) was too small once
# e2eModifying started running here alongside e2eReadOnly: the JVM hit a genuine heap
# OutOfMemoryError partway through the combined suite (confirmed via `-XX:+ExitOnOutOfMemoryError`
# exit code 3 in the pod's container status), which killed in-flight requests and cascaded into
# connection-refused failures for the rest of the run. Raise the heap and container memory limit
# for preview only — other environments are unaffected.
resources:
  requests:
    memory: "768Mi"
    cpu: "500m"
  limits:
    memory: "1536Mi"
    cpu: "1000m"
javaToolOptions: >-
  -Xms512M -Xmx900M -Xss256K
  -XX:MaxDirectMemorySize=180M
  -XX:MaxMetaspaceSize=120M
  -XX:ReservedCodeCacheSize=120M

# replicaCount must be 1 when postgresContainer.enabled=true — each pod has its own
# independent sidecar database; multiple replicas would have inconsistent data.
replicaCount: 1

# fsGroup: 70 makes the emptyDir volume group-writable by GID 70 (the postgres user's GID in
# Alpine). Without this, the kubelet creates the emptyDir owned by root:root (mode 0755), and
# the postgres process (UID 70) cannot create the data/ subdirectory inside it.
# The volume is mounted at /var/lib/postgresql (the parent) so that postgres creates data/
# itself — owned by UID 70 — and can then chmod 700 it without needing to own the mount point.
podSecurityContext:
  fsGroup: 70

# PostgreSQL sidecar container. Runs alongside the application in the same pod,
# using ephemeral (emptyDir) storage. Data is lost on pod restart or helm uninstall —
# which is acceptable since Flyway recreates the schema on startup.
postgresContainer:
  enabled: true
  image: public.ecr.aws/docker/library/postgres:17-alpine
  port: 5432
  database: providerdata
  username: postgres
  password: ""  # Always overridden at deploy time — never relies on this default.
  # Memory raised from 128Mi/256Mi: the previous limit was OOM-killing the sidecar under the
  # write load of e2eModifying (now running in CI alongside e2eReadOnly), which dropped the
  # app's DB connections and cascaded into connection-refused failures for the rest of the run.
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "250m"

prometheus:
  metricsEnabled: false
  metricsQualifier: "preview"

# No rate limiting for ephemeral preview environments.
rateLimit:
  rps: ""
  rpm: ""
  burst: ""

# External ingress is enabled so the PR-specific URL is accessible.
# The host and TLS values are set by the deploy workflow.
ingress:
  enabled: true

ingressInternal:
  enabled: false

ingressShared:
  enabled: false

# The postgres-data volume is used by the postgres sidecar container (see postgresContainer above).
volumes:
  - name: postgres-data
    emptyDir: {}
