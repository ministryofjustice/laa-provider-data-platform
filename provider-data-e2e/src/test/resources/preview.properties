# Base URI is overridden via -De2e.baseUri in the pipeline (port-forward to localhost)
e2e.baseUri=http://127.0.0.1:18080

# Test data matches the seed inserted by LocalDataSeeder on startup (preview Spring profile).

# ---- Legal Services Provider ----
lsp.firmNumber=100001
lsp.constitutionalStatus=Partnership
lsp.companiesHouseNumber=12345678
lsp.indemnityReceivedDate=2020-01-01
lsp.liaisonManager.lastName=Johnson
lsp.contractManager.lastName=Smith
lsp.office.code=ACC001

# ---- LSP bank account (filter values) ----
# partialMatch must be a substring of a bank account number for lsp.firmNumber
lsp.bankAccount.partialMatch=123
# noMatch must not match any bank account number for lsp.firmNumber
lsp.bankAccount.noMatch=XXXXXX

# ---- Chambers ----
chambers.firmNumber=100002
chambers.office.code=ACC002
chambers.dx.firmNumber=100004
chambers.dx.office.code=ACC004

# ---- Contract managers ----
contractManager.id=CM001
contractManager.firstName=John
contractManager.lastName=Smith
secondContractManager.id=CM002

# ---- Invalid identifiers (for 404 testing) ----
invalid.firmNumber=UNKNOWN-FIRM
invalid.officeCode=ZZZZZZZ

# ---- LSP2 (two-office LSP for child office view tests) ----
lsp2.firmNumber=100005
lsp2.headOffice.code=ACC005
lsp2.childOffice.code=ACC006
lsp2.contractManager.id=CM003
lsp2.contractManager.firstName=Test
lsp2.contractManager.lastName=ChildCm
