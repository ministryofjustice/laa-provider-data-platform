# Base URI is overridden via -De2e.baseUri in the pipeline (port-forward to localhost)
e2e.baseUri=http://127.0.0.1:18080

# Database credentials are supplied via environment variables in the pipeline:
#   E2E_DB_URL, E2E_DB_USERNAME, E2E_DB_PASSWORD

# ---- Legal Services Provider (E2E-LSP-001) ----
lsp.firmNumber=E2E-LSP-001
lsp.name=E2E Test LSP Firm
lsp.firmType=Legal Services Provider

# ---- LSP head office ----
lsp.office.code=E2E-ACC-001
lsp.office.address.line1=10 E2E Street
lsp.office.address.line2=Floor 1
lsp.office.address.townOrCity=London
lsp.office.address.postcode=E2E 1AA
lsp.office.telephoneNumber=020 1111 2222
lsp.office.emailAddress=e2e-office1@test.example.com
lsp.office.dxNumber=DX-E2E-1
lsp.office.dxCentre=E2E Centre
lsp.office.vatNumber=GB-E2E-VAT-001
lsp.office.paymentMethod=EFT

# ---- LSP bank account ----
lsp.bankAccount.name=E2E Bank Account 1
lsp.bankAccount.sortCode=100000
lsp.bankAccount.accountNumber=E2E00001
# partialMatch must be a substring of lsp.bankAccount.accountNumber
lsp.bankAccount.partialMatch=E2E
# noMatch must not match any bank account number for lsp.firmNumber
lsp.bankAccount.noMatch=XXXXXX

# ---- LSP head office liaison manager ----
lsp.liaisonManager.firstName=E2E-Alice
lsp.liaisonManager.lastName=E2E-Johnson
lsp.liaisonManager.emailAddress=e2e-alice@test.example.com
lsp.liaisonManager.telephoneNumber=020 9999 0000

# ---- Chambers (E2E-CHM-001) ----
chambers.firmNumber=E2E-CHM-001
chambers.name=E2E Test Chambers
chambers.firmType=Chambers
chambers.office.code=E2E-ACC-002

# ---- Advocate (E2E-ADV-001) — member of Chambers E2E-CHM-001 ----
advocate.firmNumber=E2E-ADV-001
advocate.name=E2E Test Advocate
advocate.firmType=Advocate
advocate.office.code=E2E-ACC-003

# ---- Contract managers ----
contractManager.id=E2E-CM-001
contractManager.firstName=E2E-John
contractManager.lastName=E2E-Smith
contractManager.guid=e2e00000-0000-0000-0000-000000000030

# ---- GUIDs (for endpoints requiring UUIDs) ----
lsp.guid=e2e00000-0000-0000-0000-000000000001
lsp.office.guid=e2e00000-0000-0000-0000-000000000010

# ---- Invalid identifiers (for 404 testing) ----
invalid.firmNumber=UNKNOWN-FIRM
invalid.officeCode=ZZZZZZZ
