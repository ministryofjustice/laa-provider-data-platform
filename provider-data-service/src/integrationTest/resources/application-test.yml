spring:
  jpa:
    # Keep SQL statement logging off in tests to reduce noise
    show-sql: false
    properties:
      hibernate:
        session:
          events:
            log:
              # Keep slow-query logging enabled in tests too (safe default).
              LOG_QUERIES_SLOWER_THAN_MS: 100

logging:
  level:
    uk.gov.justice.laadata.providers: DEBUG
    # Ensure slow query logger is visible in test logs if triggered.
    org.hibernate.SQL_SLOW: INFO

management:
  tracing:
    sampling:
      probability: 1.0

feature:
  trace-demo:
    enabled: true

app:
  security:
    apikey:
      enabled: false
    oauth2:
      enabled: false

laa:
  springboot:
    starter:
      auth:
        authentication-header: X-Authorization
        authorized-clients: >
          [{"name":"TestClient","roles":["STANDARD"],"token":"Dummy1"}]
        authorized-roles: >
          [{"name":"STANDARD","uris":["/**"]}]
        unprotected-uris: /error,/actuator/**
      oauth2:
        resourceserver:
          jwt:
            tenants:
              - issuer-uri: https://login.microsoftonline.com/test-tenant/v2.0
                audiences:
                  - api://pda-r2
        authorized-roles: >
          [{"name":"PDA_ACCESS","uris":["/**"]}]
        unprotected-uris: /error,/actuator/**
