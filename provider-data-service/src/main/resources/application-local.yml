### This application properties YAML provides specific overrides for the `local` profile.
###
### The datasource configuration is **deliberately omitted** so that it gets autoconfigured
### by Spring Boot Docker Compose support from the PostgreSQL service in `compose.yaml`.
###
### For more details, see **Service Connections** in the Spring Boot reference documentation:
###     https://docs.spring.io/spring-boot/reference/features/dev-services.html
###
### This is also the reason that the datasource for non-`local` profiles is defined in the
### second YAML document in `application.yml`.
###
spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    # Enable SQL statement logging in local dev only
    show-sql: true
    properties:
      hibernate:
        # Enable Hibernate statistics in local so Hibernate metrics can be exported to Prometheus.
        generate_statistics: true

management:
  tracing:
    # Local runs can discover the Compose-managed Zipkin container automatically via Spring Boot
    # service connections. A deployed environment with a managed Zipkin instance would normally set
    # `management.tracing.export.zipkin.endpoint` externally instead of defining it here.
    sampling:
      probability: 1.0
  metrics:
    enable:
      # Ensure Hibernate metrics are enabled in local
      hibernate: true

feature:
  trace-demo:
    enabled: true

logging:
  level:
    uk.gov.justice.laadata.providers: DEBUG
