### The general application properties YAML, which may be overridden in specific profiles.
###
### Note that this is a multi-document YAML file, with a second document (see below the
### `---` document separator) that is for non-`local` profiles.
###
spring:
  application:
    name: PDA (persistent)
  jackson:
    default-property-inclusion: non_null
  datasource:
    hikari:
      maximum-pool-size: 10  # Maximum connections per pod
      minimum-idle: 3        # Start with 3, grow to max under load
      idle-timeout: 300000   # 5 minutes - close idle connections
      connection-timeout: 30000        # 30 seconds - fail fast if pool exhausted
      max-lifetime: 1800000            # 30 minutes - refresh connections periodically
      leak-detection-threshold: 60000  # 60 seconds - detect connection leaks
  profiles:
    active: ${TARGET_ENVIRONMENT:local}
  threads:
    virtual:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    # SQL statement logging should be enabled only in local dev (see application-local.yml)
    show-sql: false
    properties:
      hibernate:
        session:
          events:
            log:
              # Log only slow queries (ms threshold). Applies in all environments.
              LOG_QUERIES_SLOWER_THAN_MS: 100

info:
  app:
    name: PDA (persistent)
    description: "The provider data API (persistent) will own data about provider firms and offices (and, later on, contracts and schedules)"

logging:
  level:
    root: INFO
    ch: WARN
    io: WARN
    jakarta: WARN
    javax: WARN
    net: WARN
    org.hibernate: WARN
    # Slow query SQL text logger (Hibernate)
    org.hibernate.SQL_SLOW: INFO
    org.springframework: WARN
    uk.gov.justice.laadata.providers: INFO
    uk.gov.laa.springboot.auth: WARN
  pattern:
    console: "%gray(%d{yyyy-MM-dd HH:mm:ss.SSS}) [%thread] [TraceId=%X{traceId:-}] [SpanId=%X{spanId:-}] [%highlight(%-5level)] [%cyan(%class{0}.%M:%L)] - %msg %n"

management:
  endpoints:
    web:
      exposure:
        include: [ health, info, prometheus ]
  metrics:
    enable:
      spring:
        security: false  # Disable meters with an ID starting with `spring.security`
    tags:
      application: provider-data-platform  # Used by Grafana dashboard

springdoc:
  default-flat-param-object: true
  swagger-ui:
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
    urls-primary-name: v1 - default
  writer-with-default-pretty-printer: true

---
### This is a multi-document YAML file. The first document (above) has general settings for all profiles.
### This document has property overrides for when the profile is NEITHER `local` NOR `test`.
###
spring:
  config:
    activate:
      on-profile: "!local & !test"
  # Datasource credentials for all non-local profiles (no way to "unset" config for the local profile)
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

management:
  metrics:
    enable:
      # Ensure Hibernate metrics are not emitted in non-local environments
      hibernate: false

# Use structured logging for non-local profiles (no way to "unset" config for the local profile)
logging:
  structured:
    ecs:
      service:
        environment: ${TARGET_ENVIRONMENT:unknown}
    format:
      console: ecs

# Sentry is only needed for non-local profiles.
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${TARGET_ENVIRONMENT:unknown}
  send-default-pii: false
  traces-sample-rate: ${SENTRY_TRACESSAMPLERATE:0.2}
